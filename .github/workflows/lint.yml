name: Lint
on: [push, pull_request]
permissions: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up D
        uses: dlang-community/setup-dlang@v2

      - name: Lint code
        run: dub lint

  analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container: alpine:edge
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up D
        run: apk add dub gcc gcc-gdc musl-dev sqlite

      - name: Lint code
        run: dub build --config=analysis
